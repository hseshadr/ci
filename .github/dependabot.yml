# Keep THIS repo's full-SHA action pins current in one place. Dependabot's
# github-actions ecosystem walks `uses:` refs in .github/workflows, updating both
# each SHA and its trailing `# v...` comment. The security-policy test keeps nested
# composites and copy-ready examples on immutable refs as they are updated.
# A merged bump propagates to consumers through the first-party @ci-v1 tag.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
