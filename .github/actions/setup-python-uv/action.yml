# Composite action: install uv (cached wheels), pin Python, and (optionally) `uv sync`.
#
# This is the ONE place the portfolio installs the Python toolchain. Both the
# `python-gate` reusable workflow and the `security-audit` pip-audit job compose it,
# so the uv pin and the Python-install idiom live here and nowhere else.
#
# WHY a composite and not only the python-gate reusable workflow: a reusable
# workflow is a whole job on its own runner, so it can't share a checkout or
# interleave with other steps. almamesh's exit-gate / e2e-smoke jobs each need BOTH
# the Python toolchain (for the bundle publisher) AND Bun in ONE job. A composite
# composes WITHIN that job — the caller keeps its single checkout and its
# Bun/Playwright/asset steps, and folds Python setup in via one `uses:`.
#
# The caller MUST have already run actions/checkout (a composite can't assume the
# working tree). Usage:
#   - uses: actions/checkout@v7
#   - uses: hseshadr/ci/.github/actions/setup-python-uv@ci-v1
#     with: { working-directory: backend, sync-args: "--locked --extra dev" }
name: "Setup Python + uv"
description: "Install uv (cached), pin Python, and optionally uv sync. Checkout is the caller's responsibility."

inputs:
  python-version:
    description: "Python version to install via uv."
    default: "3.13"
  sync-args:
    description: "Extra args appended to `uv sync` (e.g. '--frozen --all-extras'). Empty = bare `uv sync`."
    default: ""
  working-directory:
    description: "Dir holding pyproject.toml + uv.lock."
    default: "."
  run-sync:
    description: >-
      "true" = run `uv sync` after setup (the normal gate path). "false" = install
      uv + pin Python only, for jobs that `uv export`/`uvx` instead of syncing a venv
      (e.g. the pip-audit job).
    default: "true"

runs:
  using: composite
  steps:
    # setup-uv publishes no floating major tag (only v8.x.y) — pin the concrete
    # patch; Dependabot's github-actions ecosystem walks it forward.
    - uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
    - name: Pin Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}
    - name: Sync
      if: ${{ inputs.run-sync == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync ${{ inputs.sync-args }}
