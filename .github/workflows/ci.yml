name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-policy:
    name: Security policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate CI security policy
        run: |
          bash -n .github/actions/*/*.sh tests/security-policy.sh
          shellcheck .github/actions/*/*.sh tests/security-policy.sh
          tests/security-policy.sh
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - name: Audit all workflows and actions
        run: uvx "zizmor@1.26.1" .
