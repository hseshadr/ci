name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-policy:
    name: Security policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate CI security policy
        run: |
          bash -n tests/security-policy.sh .github/actions/pages-deploy-dist/apply-security-headers.sh
          tests/security-policy.sh
