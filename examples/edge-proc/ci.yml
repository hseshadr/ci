# edge-proc — .github/workflows/ci.yml   (replaces the current ~49-line ci.yml)
# Pure Python library. Calls the shared templates like every other consumer — the
# dedicated hseshadr/ci host means there is NO filename clash and NO local-ref
# special case (the old "rename to security.yml" gotcha is gone).
name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  pull-requests: read
jobs:
  gate:
    uses: hseshadr/ci/.github/workflows/python-gate.yml@9e8cf2e170441a6250b9b3c1a7af8128539a388f # ci-v2.0.1
    with:
      sync-args: "--frozen --all-extras"
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@9e8cf2e170441a6250b9b3c1a7af8128539a388f # ci-v2.0.1
