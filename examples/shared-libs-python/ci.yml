# shared-libs-python — .github/workflows/ci.yml
# Uploads coverage to Codecov. For a PRIVATE repo the optional CODECOV_TOKEN is passed
# BY NAME so the upload authenticates (a missing token soft-fails, so CI never goes red
# on the upload). publish.yml (PyPI/npm release) stays repo-local.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: read
jobs:
  gate:
    uses: hseshadr/ci/.github/workflows/python-gate.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
    with:
      upload-coverage: true
    # Name the one secret the gate needs. `secrets: inherit` would forward every repo
    # secret — including PyPI/npm credentials — into a workflow that only wants Codecov.
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
