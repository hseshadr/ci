# shared-libs-python — .github/workflows/ci.yml
# Uploads coverage to Codecov. For a PRIVATE repo, `secrets: inherit` forwards the
# optional CODECOV_TOKEN so the upload authenticates (missing token soft-fails, so
# CI never goes red on the upload). publish.yml (PyPI/npm release) stays repo-local.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: read
jobs:
  gate:
    uses: hseshadr/ci/.github/workflows/python-gate.yml@36bf999acd0617135497b62605e19bed29ee1b94 # ci-v2.0.0
    with:
      upload-coverage: true
    secrets: inherit
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@36bf999acd0617135497b62605e19bed29ee1b94 # ci-v2.0.0
