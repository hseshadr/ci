# edge-reco — .github/workflows/deploy.yml   (was ~139 lines -> ~18)
# Fits the reusable Pages deploy: the model-weights fetch goes in pre-build-run; the
# only thing lost vs bespoke is the deploy-time weights cache (fine — deploys are rare).
name: Deploy edge-reco.com
on: # zizmor: ignore[dangerous-triggers] deploy-after-CI by design; the triggering run is pinned to this repo + branch main + conclusion success, and no PR code is ever checked out
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    # workflow_run fires on COMPLETION, not on success — without this guard a red CI
    # run still deploys. Mirrors examples/aml-filter/deploy.yml.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: hseshadr/ci/.github/workflows/cloudflare-pages-deploy.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
    with:
      project-name: edge-reco
      dist-dir: frontend/app/dist
      install-working-directory: frontend
      pre-build-run: "cd frontend/app && node scripts/download-model.mjs"
      build-command: "pnpm -C frontend -F frontend run build:pages"
      package-json-file: frontend/package.json
      node-version-file: frontend/.node-version
      cache-dependency-path: frontend/pnpm-lock.yaml
    # Name the two secrets this deploy actually needs. `secrets: inherit` would hand the
    # called workflow EVERY secret in the repo, including ones it has no business seeing.
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
