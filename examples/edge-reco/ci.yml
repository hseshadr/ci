# edge-reco — .github/workflows/ci.yml   (the mixed case: Python backend + pnpm frontend)
#
# gitleaks + backend        -> reusable workflows (clean).
# frontend + e2e            -> STAY bespoke jobs (a model-weights cache is a `uses:`
#                              step a reusable workflow can't own) BUT they re-use
#                              ZERO setup/caching boilerplate: setup-pnpm,
#                              restore-model-cache and setup-playwright are all
#                              composed from hseshadr/ci. Only the two `pnpm run`
#                              gate commands are repo-specific.
name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  pull-requests: read
jobs:
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2

  quality:
    uses: hseshadr/ci/.github/workflows/python-gate.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
    with:
      working-directory: backend
      sync-args: "--group dev"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: hseshadr/ci/.github/actions/setup-pnpm@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
        with:
          package-json-file: frontend/package.json
          node-version-file: frontend/.node-version
          cache-dependency-path: frontend/pnpm-lock.yaml
          working-directory: frontend
      - uses: hseshadr/ci/.github/actions/restore-model-cache@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
        with:
          cache-path: frontend/app/public/models
          cache-key: model-weights-${{ runner.os }}-${{ hashFiles('frontend/app/scripts/download-model.mjs') }}
          fetch-command: node scripts/download-model.mjs
          working-directory: frontend/app
      - name: Gate — quality half
        working-directory: frontend
        run: pnpm run gate:quality

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: hseshadr/ci/.github/actions/setup-pnpm@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
        with:
          package-json-file: frontend/package.json
          node-version-file: frontend/.node-version
          cache-dependency-path: frontend/pnpm-lock.yaml
          working-directory: frontend
      - uses: hseshadr/ci/.github/actions/restore-model-cache@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
        with:
          cache-path: frontend/app/public/models
          cache-key: model-weights-${{ runner.os }}-${{ hashFiles('frontend/app/scripts/download-model.mjs') }}
          fetch-command: node scripts/download-model.mjs
          working-directory: frontend/app
      - uses: hseshadr/ci/.github/actions/setup-playwright@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
        with:
          working-directory: frontend
          cache-key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Gate — e2e half
        working-directory: frontend
        run: pnpm run gate:e2e
