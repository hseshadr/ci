# privacy-core — .github/workflows/ci.yml
# Single-package TS repo at root — the cleanest fit for frontend-gate.yml (no model
# weights, no injected caching). gate = biome -> tsc -> vitest -> test:e2e -> build,
# so it needs a Playwright browser (installed + cached by the template).
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: read
jobs:
  gate:
    uses: hseshadr/ci/.github/workflows/frontend-gate.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
    with:
      install-args: "--frozen-lockfile --config.dangerously-allow-all-builds=true"
      install-playwright: true
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
