  contents: read
jobs:
  audit:
    uses: hseshadr/ci/.github/workflows/security-audit.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
    with:
      run-pnpm-audit: true
      frontend-working-directory: "."
      pnpm-audit-level: moderate
