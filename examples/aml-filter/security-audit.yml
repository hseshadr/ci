# aml-filter — .github/workflows/security-audit.yml   (was ~60 lines -> ~16)
name: Security audit
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    uses: hseshadr/ci/.github/workflows/security-audit.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
    with:
      run-pnpm-audit: true
      frontend-working-directory: frontend
      pnpm-audit-level: low
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
