# aml-filter — .github/workflows/security-audit.yml   (was ~60 lines -> ~16)
name: Security audit
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    uses: hseshadr/ci/.github/workflows/security-audit.yml@36bf999acd0617135497b62605e19bed29ee1b94 # ci-v2.0.0
    with:
      run-pnpm-audit: true
      frontend-working-directory: frontend
      pnpm-audit-level: low
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@36bf999acd0617135497b62605e19bed29ee1b94 # ci-v2.0.0
