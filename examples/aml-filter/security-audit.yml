# aml-filter — .github/workflows/security-audit.yml   (was ~60 lines -> ~16)
name: Security audit
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    uses: hseshadr/ci/.github/workflows/security-audit.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
    with:
      run-pnpm-audit: true
      frontend-working-directory: frontend
      pnpm-audit-level: low
  gitleaks:
    uses: hseshadr/ci/.github/workflows/secret-scan.yml@bc68fde66f0805971e1b9aa444933b7975da80b1 # ci-v2.0.3
